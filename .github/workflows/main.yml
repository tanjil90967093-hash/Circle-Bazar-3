name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Create Dummy google-services.json if missing
      run: |
        DUMMY_JSON='{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.example"}},"api_key":[{"current_key":"dummy"}]}]}'
        
        mkdir -p app
        if [ ! -f "app/google-services.json" ]; then
          echo "$DUMMY_JSON" > app/google-services.json
        fi
        
        if [ -d "android" ]; then
          mkdir -p android/app
          if [ ! -f "android/app/google-services.json" ]; then
            echo "$DUMMY_JSON" > android/app/google-services.json
          fi
        fi

    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
        fi

        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Circle-Bazar-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
