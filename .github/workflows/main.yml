name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle CLI
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'
        cache-disabled: true

    - name: Auto-Locate and Build Android Project
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx2048m -XX:MaxMetaspaceSize=512m'"
      run: |
        echo "Searching for Android Gradle configuration..."
        if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          echo "Found build.gradle in root."
          gradle assembleDebug --stacktrace --no-daemon
        elif [ -d "android" ] && ( [ -f "android/build.gradle" ] || [ -f "android/build.gradle.kts" ] ); then
          echo "Found build.gradle in /android directory."
          cd android
          gradle assembleDebug --stacktrace --no-daemon
        else
          GRADLE_DIR=$(find . -maxdepth 3 \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 | xargs dirname)
          if [ -n "$GRADLE_DIR" ]; then
            echo "Found build.gradle in $GRADLE_DIR"
            cd "$GRADLE_DIR"
            gradle assembleDebug --stacktrace --no-daemon
          else
            echo "ERROR: Could not find build.gradle anywhere in the repository!"
            exit 1
          fi
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Circle-Bazar-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
