name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Configure Gradle for KSP
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        echo "kotlin.compiler.execution.strategy=out-of-process" >> ~/.gradle/gradle.properties
        echo "ksp.incremental=false" >> ~/.gradle/gradle.properties

    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
        fi

        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Circle-Bazar-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
