name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ১. package.json থাকলে NPM রান করবে, না থাকলে স্কিপ করবে (ফেল মারবে না)
    - name: Install Dependencies & Build Web Project
      run: |
        if [ -f "package.json" ]; then
          echo "package.json found! Installing dependencies..."
          npm install --force
          npm run build --if-present
          npx cap sync android || true
        else
          echo "No package.json in root. Skipping NPM step..."
        fi

    # ২. ফ্রেশ গ্র্যাডল সেটআপ (ক্যাশ বন্ধ রাখা হয়েছে)
    - name: Setup Gradle CLI
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        cache-disabled: true

    # ৩. অ্যান্ড্রয়েড ফোল্ডার খুঁজে বের করে APK বিল্ড করা
    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
          gradle assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi

    # ৪. বিল্ড হওয়া APK গিটহাবে আপলোড করে দেওয়া (ডাউনলোডের জন্য)
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Circle-Bazar-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
